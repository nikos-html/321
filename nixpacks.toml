[packages]
python = "3.11"
nodejs = "18"

[phases.setup]
nixPkgs = ["...", "postgresql"]

[phases.install]
cmds = ["cd backend && pip install -r requirements.txt"]

[phases.build]
cmds = ["cd frontend && npm install && npm run build"]

[start]
cmd = "cd backend && python -m uvicorn server:app --host 0.0.0.0 --port ${PORT:-8001}"
